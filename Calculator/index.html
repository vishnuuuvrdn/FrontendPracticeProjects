<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS Practice</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="cal" class="calContainer">
        <div class="outputArea">
            <h3 id="outputH3"></h3>
        </div>
        <div class="button-row">
            <button id="oneBtn" class="btns">1</button>
            <button id="twoBtn" class="btns">2</button>
            <button id="threeBtn" class="btns">3</button>
            <button id="plusBtn" class="btns">+</button>
        </div>
        <div class="button-row">
            <button id="fourBtn" class="btns">4</button>
            <button id="fiveBtn" class="btns">5</button>
            <button id="sixBtn" class="btns">6</button>
            <button id="minusBtn" class="btns">-</button>
        </div>
        <div class="button-row">
            <button id="sevenBtn" class="btns">7</button>
            <button id="eightBtn" class="btns">8</button>
            <button id="nineBtn" class="btns">9</button>
            <button id="multiplyBtn" class="btns">×</button>
        </div>
        <div class="button-row">
            <button id="dotBtn" class="btns">.</button>
            <button id="zeroBtn" class="btns">0</button>
            <button id="clearBtn" class="btns">C</button>
            <button id="divideBtn" class="btns">÷</button>
        </div>
        <div class="button-row">
            <button class="btns">!</button>
            <button class="btns">!</button>
            <button id="allClearBtn" class="btns">AC</button>
            <button id="equalBtn" class="btns">=</button>
        </div>
    </div>
    <script src="index.js"></script>
</body>
</html>
